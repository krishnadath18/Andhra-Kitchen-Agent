AWSTemplateFormatVersion: '2010-09-09'
Description: 'API Gateway Authentication Configuration for Andhra Kitchen Agent'

# ============================================================================
# ⚠️ DEPRECATION WARNING ⚠️
# ============================================================================
# This template is DEPRECATED and has known security issues:
# 1. Circular dependency - requires API Gateway ID but API stack needs this
# 2. Imports non-existent UsagePlanId export
# 3. Must be deployed in specific order (fragile)
#
# SECURE ALTERNATIVE: Use api-gateway-fixed.yaml instead
# See infrastructure/INFRASTRUCTURE_SECURITY_FIXES.md for details
# ============================================================================

# This template adds authentication to the API Gateway
# Deploy this AFTER deploying the main api-gateway.yaml

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - prod
    Description: Environment name
  
  APIGatewayId:
    Type: String
    Description: ID of the existing API Gateway REST API

Resources:
  # ============================================================================
  # Cognito User Pool for Authentication
  # ============================================================================
  
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub 'kitchen-agent-users-${Environment}'
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: false
      Policies:
        PasswordPolicy:
          MinimumLength: 12
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1
      UserPoolAddOns:
        AdvancedSecurityMode: ENFORCED
      MfaConfiguration: OPTIONAL
      EnabledMfas:
        - SOFTWARE_TOKEN_MFA
  
  # ============================================================================
  # Cognito User Pool Client
  # ============================================================================
  
  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub 'kitchen-agent-client-${Environment}'
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      PreventUserExistenceErrors: ENABLED
      AccessTokenValidity: 1  # 1 hour
      IdTokenValidity: 1  # 1 hour
      RefreshTokenValidity: 30  # 30 days
      TokenValidityUnits:
        AccessToken: hours
        IdToken: hours
        RefreshToken: days
  
  # ============================================================================
  # API Gateway Cognito Authorizer
  # ============================================================================
  
  CognitoAuthorizer:
    Type: AWS::ApiGateway::Authorizer
    Properties:
      Name: !Sub 'kitchen-agent-authorizer-${Environment}'
      Type: COGNITO_USER_POOLS
      IdentitySource: method.request.header.Authorization
      RestApiId: !Ref APIGatewayId
      ProviderARNs:
        - !GetAtt UserPool.Arn
  
  # ============================================================================
  # API Keys for Additional Security Layer
  # ============================================================================
  
  APIKey:
    Type: AWS::ApiGateway::ApiKey
    Properties:
      Name: !Sub 'kitchen-agent-api-key-${Environment}'
      Description: API Key for Kitchen Agent
      Enabled: true
  
  # ============================================================================
  # Usage Plan with API Key
  # ============================================================================
  
  UsagePlanKeyAssociation:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId: !Ref APIKey
      KeyType: API_KEY
      UsagePlanId: !ImportValue 
        Fn::Sub: '${AWS::StackName}-UsagePlanId'

Outputs:
  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref UserPool
    Export:
      Name: !Sub '${AWS::StackName}-UserPoolId'
  
  UserPoolClientId:
    Description: Cognito User Pool Client ID
    Value: !Ref UserPoolClient
    Export:
      Name: !Sub '${AWS::StackName}-UserPoolClientId'
  
  CognitoAuthorizerId:
    Description: API Gateway Cognito Authorizer ID
    Value: !Ref CognitoAuthorizer
    Export:
      Name: !Sub '${AWS::StackName}-CognitoAuthorizerId'
  
  APIKeyId:
    Description: API Gateway API Key ID
    Value: !Ref APIKey
    Export:
      Name: !Sub '${AWS::StackName}-APIKeyId'
