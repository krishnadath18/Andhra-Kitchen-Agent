AWSTemplateFormatVersion: '2010-09-09'
Description: 'API Gateway Configuration for Andhra Kitchen Agent'

# ============================================================================
# ⚠️ DEPRECATION WARNING ⚠️
# ============================================================================
# This template is DEPRECATED and has known security issues:
# 1. Circular dependency with api-gateway-auth.yaml
# 2. Incomplete CORS preflight (only root has OPTIONS)
# 3. Hardcoded wildcard CORS origins
# 4. Inconsistent with main-stack.yaml auth model
#
# SECURE ALTERNATIVE: Use api-gateway-fixed.yaml instead
# See infrastructure/INFRASTRUCTURE_SECURITY_FIXES.md for details
# ============================================================================

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - prod
    Description: Environment name
  
  LambdaFunctionArn:
    Type: String
    Description: ARN of the Lambda function to integrate with API Gateway

  AuthStackName:
    Type: String
    Default: kitchen-agent-auth-dev
    Description: Stack name that exports the Cognito authorizer ID

Resources:
  # ============================================================================
  # API Gateway REST API
  # ============================================================================
  
  KitchenAgentAPI:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub 'kitchen-agent-api-${Environment}'
      Description: REST API for Andhra Kitchen Agent
      EndpointConfiguration:
        Types:
          - REGIONAL
      Policy:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: 'execute-api:Invoke'
            Resource: '*'
            # SECURITY: Restrict to specific IP ranges in production
            # Uncomment and configure for production:
            # Condition:
            #   IpAddress:
            #     aws:SourceIp:
            #       - '203.0.113.0/24'  # Your office network
            #       - '198.51.100.0/24'  # Your cloud provider
            # For development, consider using AWS WAF for IP filtering
  
  # ============================================================================
  # API Gateway Stage
  # ============================================================================
  
  APIStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      StageName: v1
      RestApiId: !Ref KitchenAgentAPI
      DeploymentId: !Ref APIDeployment
      Description: Version 1 API Stage
      TracingEnabled: true
      MethodSettings:
        - ResourcePath: '/*'
          HttpMethod: '*'
          LoggingLevel: INFO
          DataTraceEnabled: true
          MetricsEnabled: true
          ThrottlingBurstLimit: 20
          ThrottlingRateLimit: 100
      Variables:
        environment: !Ref Environment
  
  # ============================================================================
  # API Gateway Deployment
  # ============================================================================
  
  APIDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - ChatMethod
      - SessionMethod
      - UploadImageMethod
      - AnalyzeImageMethod
      - GenerateRecipesMethod
      - GenerateShoppingListMethod
      - GetRemindersMethod
      - DismissReminderMethod
      - SnoozeReminderMethod
      - GetSessionMethod
    Properties:
      RestApiId: !Ref KitchenAgentAPI
      Description: API Deployment
  
  # ============================================================================
  # Usage Plan and API Key (for rate limiting)
  # ============================================================================
  
  APIUsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    DependsOn: APIStage
    Properties:
      UsagePlanName: !Sub 'kitchen-agent-usage-plan-${Environment}'
      Description: Usage plan with rate limiting
      ApiStages:
        - ApiId: !Ref KitchenAgentAPI
          Stage: v1
      Throttle:
        BurstLimit: 20
        RateLimit: 100
      Quota:
        Limit: 10000
        Period: DAY
  
  # ============================================================================
  # CORS Configuration
  # ============================================================================
  
  OptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref KitchenAgentAPI
      ResourceId: !GetAtt KitchenAgentAPI.RootResourceId
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
              method.response.header.Access-Control-Allow-Methods: "'GET,POST,OPTIONS'"
              # SECURITY: Restrict to specific origin in production
              # Replace '*' with your domain: "'https://yourdomain.com'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
            ResponseTemplates:
              application/json: ''
        RequestTemplates:
          application/json: '{"statusCode": 200}'
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true
  
  # ============================================================================
  # API Resources
  # ============================================================================
  
  ChatResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref KitchenAgentAPI
      ParentId: !GetAtt KitchenAgentAPI.RootResourceId
      PathPart: chat
  
  SessionResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref KitchenAgentAPI
      ParentId: !GetAtt KitchenAgentAPI.RootResourceId
      PathPart: session
  
  SessionIdResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref KitchenAgentAPI
      ParentId: !Ref SessionResource
      PathPart: '{session_id}'
  
  UploadImageResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref KitchenAgentAPI
      ParentId: !GetAtt KitchenAgentAPI.RootResourceId
      PathPart: upload-image
  
  AnalyzeImageResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref KitchenAgentAPI
      ParentId: !GetAtt KitchenAgentAPI.RootResourceId
      PathPart: analyze-image
  
  GenerateRecipesResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref KitchenAgentAPI
      ParentId: !GetAtt KitchenAgentAPI.RootResourceId
      PathPart: generate-recipes
  
  GenerateShoppingListResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref KitchenAgentAPI
      ParentId: !GetAtt KitchenAgentAPI.RootResourceId
      PathPart: generate-shopping-list
  
  RemindersResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref KitchenAgentAPI
      ParentId: !GetAtt KitchenAgentAPI.RootResourceId
      PathPart: reminders
  
  RemindersSessionResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref KitchenAgentAPI
      ParentId: !Ref RemindersResource
      PathPart: '{session_id}'
  
  ReminderIdResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref KitchenAgentAPI
      ParentId: !Ref RemindersResource
      PathPart: '{reminder_id}'
  
  DismissReminderResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref KitchenAgentAPI
      ParentId: !Ref ReminderIdResource
      PathPart: dismiss
  
  SnoozeReminderResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref KitchenAgentAPI
      ParentId: !Ref ReminderIdResource
      PathPart: snooze

  # ============================================================================
  # API Methods (POST /chat)
  # ============================================================================
  
  ChatMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref KitchenAgentAPI
      ResourceId: !Ref ChatResource
      HttpMethod: POST
      AuthorizationType: COGNITO_USER_POOLS
      AuthorizerId:
        Fn::ImportValue:
          Fn::Sub: '${AuthStackName}-CognitoAuthorizerId'
      RequestValidatorId: !Ref RequestValidator
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${LambdaFunctionArn}/invocations'
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Origin: "'*'"
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Origin: true
        - StatusCode: 400
        - StatusCode: 429
        - StatusCode: 500
  
  # ============================================================================
  # API Methods (POST /session)
  # ============================================================================
  
  SessionMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref KitchenAgentAPI
      ResourceId: !Ref SessionResource
      HttpMethod: POST
      AuthorizationType: COGNITO_USER_POOLS
      AuthorizerId:
        Fn::ImportValue:
          Fn::Sub: '${AuthStackName}-CognitoAuthorizerId'
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${LambdaFunctionArn}/invocations'
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Origin: true
  
  # ============================================================================
  # API Methods (GET /session/{session_id})
  # ============================================================================
  
  GetSessionMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref KitchenAgentAPI
      ResourceId: !Ref SessionIdResource
      HttpMethod: GET
      AuthorizationType: COGNITO_USER_POOLS
      AuthorizerId:
        Fn::ImportValue:
          Fn::Sub: '${AuthStackName}-CognitoAuthorizerId'
      RequestParameters:
        method.request.path.session_id: true
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${LambdaFunctionArn}/invocations'
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Origin: true
  
  # ============================================================================
  # API Methods (POST /upload-image)
  # ============================================================================
  
  UploadImageMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref KitchenAgentAPI
      ResourceId: !Ref UploadImageResource
      HttpMethod: POST
      AuthorizationType: COGNITO_USER_POOLS
      AuthorizerId:
        Fn::ImportValue:
          Fn::Sub: '${AuthStackName}-CognitoAuthorizerId'
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${LambdaFunctionArn}/invocations'
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Origin: true
  
  # ============================================================================
  # API Methods (POST /analyze-image)
  # ============================================================================
  
  AnalyzeImageMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref KitchenAgentAPI
      ResourceId: !Ref AnalyzeImageResource
      HttpMethod: POST
      AuthorizationType: COGNITO_USER_POOLS
      AuthorizerId:
        Fn::ImportValue:
          Fn::Sub: '${AuthStackName}-CognitoAuthorizerId'
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${LambdaFunctionArn}/invocations'
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Origin: true
  
  # ============================================================================
  # API Methods (POST /generate-recipes)
  # ============================================================================
  
  GenerateRecipesMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref KitchenAgentAPI
      ResourceId: !Ref GenerateRecipesResource
      HttpMethod: POST
      AuthorizationType: COGNITO_USER_POOLS
      AuthorizerId:
        Fn::ImportValue:
          Fn::Sub: '${AuthStackName}-CognitoAuthorizerId'
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${LambdaFunctionArn}/invocations'
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Origin: true
  
  # ============================================================================
  # API Methods (POST /generate-shopping-list)
  # ============================================================================
  
  GenerateShoppingListMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref KitchenAgentAPI
      ResourceId: !Ref GenerateShoppingListResource
      HttpMethod: POST
      AuthorizationType: COGNITO_USER_POOLS
      AuthorizerId:
        Fn::ImportValue:
          Fn::Sub: '${AuthStackName}-CognitoAuthorizerId'
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${LambdaFunctionArn}/invocations'
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Origin: true
  
  # ============================================================================
  # API Methods (GET /reminders/{session_id})
  # ============================================================================
  
  GetRemindersMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref KitchenAgentAPI
      ResourceId: !Ref RemindersSessionResource
      HttpMethod: GET
      AuthorizationType: COGNITO_USER_POOLS
      AuthorizerId:
        Fn::ImportValue:
          Fn::Sub: '${AuthStackName}-CognitoAuthorizerId'
      RequestParameters:
        method.request.path.session_id: true
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${LambdaFunctionArn}/invocations'
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Origin: true
  
  # ============================================================================
  # API Methods (POST /reminders/{reminder_id}/dismiss)
  # ============================================================================
  
  DismissReminderMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref KitchenAgentAPI
      ResourceId: !Ref DismissReminderResource
      HttpMethod: POST
      AuthorizationType: COGNITO_USER_POOLS
      AuthorizerId:
        Fn::ImportValue:
          Fn::Sub: '${AuthStackName}-CognitoAuthorizerId'
      RequestParameters:
        method.request.path.reminder_id: true
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${LambdaFunctionArn}/invocations'
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Origin: true
  
  # ============================================================================
  # API Methods (POST /reminders/{reminder_id}/snooze)
  # ============================================================================
  
  SnoozeReminderMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref KitchenAgentAPI
      ResourceId: !Ref SnoozeReminderResource
      HttpMethod: POST
      AuthorizationType: COGNITO_USER_POOLS
      AuthorizerId:
        Fn::ImportValue:
          Fn::Sub: '${AuthStackName}-CognitoAuthorizerId'
      RequestParameters:
        method.request.path.reminder_id: true
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${LambdaFunctionArn}/invocations'
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Origin: true
  
  # ============================================================================
  # Request Validator
  # ============================================================================
  
  RequestValidator:
    Type: AWS::ApiGateway::RequestValidator
    Properties:
      RestApiId: !Ref KitchenAgentAPI
      Name: RequestBodyValidator
      ValidateRequestBody: true
      ValidateRequestParameters: true

Outputs:
  APIEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub 'https://${KitchenAgentAPI}.execute-api.${AWS::Region}.amazonaws.com/v1'
    Export:
      Name: !Sub '${AWS::StackName}-APIEndpoint'
  
  APIId:
    Description: API Gateway ID
    Value: !Ref KitchenAgentAPI
    Export:
      Name: !Sub '${AWS::StackName}-APIId'
  
  APIStage:
    Description: API Gateway Stage
    Value: !Ref APIStage
    Export:
      Name: !Sub '${AWS::StackName}-APIStage'
