AWSTemplateFormatVersion: '2010-09-09'
Description: 'Andhra Kitchen Agent - Main Infrastructure Stack'

# ============================================================================
# ⚠️ DEPRECATION WARNING ⚠️
# ============================================================================
# This template uses AWS_IAM authorization which is incompatible with
# the Cognito-based frontend authentication in api-gateway.yaml.
#
# SECURE ALTERNATIVE: Use api-gateway-fixed.yaml for consistent Cognito auth
# See infrastructure/INFRASTRUCTURE_SECURITY_FIXES.md for details
# ============================================================================

Parameters:
  Environment:
    Type: String
    Default: 'dev'
    AllowedValues:
      - dev
      - prod
    Description: Environment name
  
  AWSAccountId:
    Type: String
    Description: AWS Account ID for resource naming

  AllowedOrigin:
    Type: String
    Description: >
      Frontend origin allowed for CORS (e.g. https://your-app.example.com).
      WARNING: Do not set to '*' - that allows any site to call the API.
    Default: 'https://localhost:8501'

Resources:
  # ==================== IAM ROLES ====================
  
  KitchenAgentCoreRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'KitchenAgentCoreRole-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole'
      Policies:
        - PolicyName: BedrockAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'bedrock:InvokeModel'
                  - 'bedrock:InvokeAgent'
                Resource:
                  - 'arn:aws:bedrock:ap-south-1::foundation-model/anthropic.claude-3-haiku-20240307-v1:0'
                  - 'arn:aws:bedrock:ap-south-1::foundation-model/anthropic.claude-3-sonnet-20240229-v1:0'
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 's3:PutObject'
                  - 's3:GetObject'
                  - 's3:DeleteObject'
                Resource: !Sub '${ImageBucket.Arn}/*'
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'dynamodb:GetItem'
                  - 'dynamodb:PutItem'
                  - 'dynamodb:UpdateItem'
                  - 'dynamodb:Query'
                Resource:
                  - !GetAtt SessionsTable.Arn
                  - !GetAtt MarketPricesTable.Arn
                  - !GetAtt RemindersTable.Arn
                  - !Sub '${RemindersTable.Arn}/index/*'
        - PolicyName: EventBridgeAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'events:PutRule'
                  - 'events:PutTargets'
                Resource: !Sub 'arn:aws:events:ap-south-1:${AWS::AccountId}:rule/kitchen-agent-reminder-*'
        - PolicyName: CloudWatchLogs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'logs:CreateLogGroup'
                  - 'logs:CreateLogStream'
                  - 'logs:PutLogEvents'
                Resource: !Sub 'arn:aws:logs:ap-south-1:${AWS::AccountId}:*'

  ReminderExecutorRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'ReminderExecutorRole-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole'
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'dynamodb:UpdateItem'
                  - 'dynamodb:GetItem'
                Resource: !GetAtt RemindersTable.Arn
        - PolicyName: EventBridgeCleanup
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'events:RemoveTargets'
                  - 'events:DeleteRule'
                Resource: !Sub 'arn:aws:events:ap-south-1:${AWS::AccountId}:rule/kitchen-agent-reminder-*'
        - PolicyName: CloudWatchLogs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'logs:CreateLogGroup'
                  - 'logs:CreateLogStream'
                  - 'logs:PutLogEvents'
                Resource: !Sub 'arn:aws:logs:ap-south-1:${AWS::AccountId}:*'

  # ==================== S3 BUCKET ====================
  
  ImageBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'kitchen-agent-images-${AWSAccountId}-${Environment}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Suspended
      LifecycleConfiguration:
        Rules:
          - Id: DeleteAfter24Hours
            Status: Enabled
            ExpirationInDays: 1
            NoncurrentVersionExpirationInDays: 1
      CorsConfiguration:
        CorsRules:
          # WARNING: AllowedOrigins: ['*'] and AllowedHeaders: ['*'] are overly permissive.
          # Secure alternative: restrict to your frontend origin only.
          - AllowedOrigins:
              - !Sub 'https://${AllowedOrigin}'
            AllowedMethods:
              - GET
              - PUT
              - POST
            AllowedHeaders:
              - 'Content-Type'
              - 'Authorization'
            MaxAge: 3600

  ImageBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ImageBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !GetAtt ImageBucket.Arn
              - !Sub '${ImageBucket.Arn}/*'
            Condition:
              Bool:
                'aws:SecureTransport': 'false'

  # ==================== DYNAMODB TABLES ====================
  
  SessionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'kitchen-agent-sessions-${Environment}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: session_id
          AttributeType: S
        - AttributeName: data_type
          AttributeType: S
      KeySchema:
        - AttributeName: session_id
          KeyType: HASH
        - AttributeName: data_type
          KeyType: RANGE
      TimeToLiveSpecification:
        Enabled: true
        AttributeName: expiry_timestamp
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: false
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: AndraKitchenAgent

  MarketPricesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'kitchen-agent-market-prices-${Environment}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: ingredient_name
          AttributeType: S
        - AttributeName: market_name
          AttributeType: S
        - AttributeName: last_updated
          AttributeType: S
      KeySchema:
        - AttributeName: ingredient_name
          KeyType: HASH
        - AttributeName: market_name
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: last_updated_index
          KeySchema:
            - AttributeName: ingredient_name
              KeyType: HASH
            - AttributeName: last_updated
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: AndraKitchenAgent

  RemindersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'kitchen-agent-reminders-${Environment}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: session_id
          AttributeType: S
        - AttributeName: reminder_id
          AttributeType: S
        - AttributeName: status
          AttributeType: S
      KeySchema:
        - AttributeName: session_id
          KeyType: HASH
        - AttributeName: reminder_id
          KeyType: RANGE
      TimeToLiveSpecification:
        Enabled: true
        AttributeName: expiry_timestamp
      GlobalSecondaryIndexes:
        - IndexName: status_index
          KeySchema:
            - AttributeName: session_id
              KeyType: HASH
            - AttributeName: status
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: AndraKitchenAgent

  # ==================== API GATEWAY ====================
  
  KitchenAgentApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub 'kitchen-agent-api-${Environment}'
      Description: 'Andhra Kitchen Agent REST API'
      EndpointConfiguration:
        Types:
          - REGIONAL
      Policy:
        Version: '2012-10-17'
        Statement:
          # WARNING: Principal: '*' with Action: execute-api:Invoke allows anyone to call
          # the API. Secure alternative: restrict to your account or use a WAF/Cognito authorizer.
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWSAccountId}:root'
            Action: 'execute-api:Invoke'
            Resource: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWSAccountId}:*'

  ApiGatewayAccount:
    Type: AWS::ApiGateway::Account
    Properties:
      CloudWatchRoleArn: !GetAtt ApiGatewayCloudWatchRole.Arn

  ApiGatewayCloudWatchRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - apigateway.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AmazonAPIGatewayPushToCloudWatchLogs'

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - ChatMethod
    Properties:
      RestApiId: !Ref KitchenAgentApi
      Description: !Sub 'Deployment for ${Environment} environment'

  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      StageName: v1
      RestApiId: !Ref KitchenAgentApi
      DeploymentId: !Ref ApiDeployment
      Description: 'Version 1 API Stage'
      MethodSettings:
        - ResourcePath: '/*'
          HttpMethod: '*'
          ThrottlingBurstLimit: 20
          ThrottlingRateLimit: 100
          LoggingLevel: INFO
          DataTraceEnabled: true
          MetricsEnabled: true
      AccessLogSetting:
        DestinationArn: !GetAtt ApiGatewayLogGroup.Arn
        Format: '$context.requestId $context.extendedRequestId $context.identity.sourceIp $context.requestTime $context.httpMethod $context.routeKey $context.status $context.protocol $context.responseLength'

  # API Resources
  ChatResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref KitchenAgentApi
      ParentId: !GetAtt KitchenAgentApi.RootResourceId
      PathPart: 'chat'

  ChatMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref KitchenAgentApi
      ResourceId: !Ref ChatResource
      HttpMethod: POST
      # WARNING: AuthorizationType: NONE means any caller can invoke this endpoint.
      # Secure alternative: use AWS_IAM, COGNITO_USER_POOLS, or a CUSTOM authorizer.
      AuthorizationType: AWS_IAM
      RequestValidatorId: !Ref RequestValidator
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${KitchenAgentCoreLambda.Arn}/invocations'
        IntegrationResponses:
          - StatusCode: 200
      MethodResponses:
        - StatusCode: 200
          ResponseModels:
            application/json: Empty
          ResponseParameters:
            method.response.header.Access-Control-Allow-Origin: true

  ChatOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref KitchenAgentApi
      ResourceId: !Ref ChatResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,Authorization'"
              method.response.header.Access-Control-Allow-Methods: "'GET,POST,OPTIONS'"
              # WARNING: Access-Control-Allow-Origin: '*' allows any site to make
              # cross-origin requests. Secure alternative: use the AllowedOrigin parameter.
              method.response.header.Access-Control-Allow-Origin: !Sub "'${AllowedOrigin}'"
            ResponseTemplates:
              application/json: ''
        RequestTemplates:
          application/json: '{"statusCode": 200}'
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  RequestValidator:
    Type: AWS::ApiGateway::RequestValidator
    Properties:
      RestApiId: !Ref KitchenAgentApi
      Name: 'request-body-validator'
      ValidateRequestBody: true
      ValidateRequestParameters: true

  # ==================== LAMBDA FUNCTIONS ====================
  
  KitchenAgentCoreLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'KitchenAgentCore-${Environment}'
      Runtime: python3.11
      Handler: index.lambda_handler
      Role: !GetAtt KitchenAgentCoreRole.Arn
      Timeout: 30
      MemorySize: 512
      Environment:
        Variables:
          ENVIRONMENT: !Ref Environment
          SESSIONS_TABLE: !Ref SessionsTable
          MARKET_PRICES_TABLE: !Ref MarketPricesTable
          REMINDERS_TABLE: !Ref RemindersTable
          IMAGE_BUCKET: !Ref ImageBucket
          AWS_REGION: !Ref AWS::Region
      Code:
        ZipFile: |
          import json
          def lambda_handler(event, context):
              return {
                  'statusCode': 200,
                  'body': json.dumps({'message': 'Kitchen Agent Core - Placeholder'})
              }
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: AndraKitchenAgent

  ReminderExecutorLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'ReminderExecutor-${Environment}'
      Runtime: python3.11
      Handler: index.lambda_handler
      Role: !GetAtt ReminderExecutorRole.Arn
      Timeout: 30
      MemorySize: 512
      Environment:
        Variables:
          ENVIRONMENT: !Ref Environment
          REMINDERS_TABLE: !Ref RemindersTable
          AWS_REGION: !Ref AWS::Region
      Code:
        ZipFile: |
          import json
          import boto3
          from datetime import datetime
          
          dynamodb = boto3.resource('dynamodb')
          events = boto3.client('events')
          
          def lambda_handler(event, context):
              reminder_id = event['reminder_id']
              session_id = event['session_id']
              
              # Update reminder status
              table = dynamodb.Table(event.get('REMINDERS_TABLE', 'kitchen-agent-reminders-dev'))
              table.update_item(
                  Key={'session_id': session_id, 'reminder_id': reminder_id},
                  UpdateExpression='SET #status = :status, delivered_at = :time',
                  ExpressionAttributeNames={'#status': 'status'},
                  ExpressionAttributeValues={
                      ':status': 'delivered',
                      ':time': datetime.utcnow().isoformat()
                  }
              )
              
              # Clean up EventBridge rule
              rule_name = f"kitchen-agent-reminder-{reminder_id}"
              try:
                  events.remove_targets(Rule=rule_name, Ids=['1'])
                  events.delete_rule(Name=rule_name)
              except Exception as e:
                  print(f"Error deleting rule: {e}")
              
              return {
                  'statusCode': 200,
                  'body': json.dumps({'message': 'Reminder delivered'})
              }
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: AndraKitchenAgent

  # Lambda Permissions
  ApiGatewayInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref KitchenAgentCoreLambda
      Action: 'lambda:InvokeFunction'
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${KitchenAgentApi}/*'

  EventBridgeInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ReminderExecutorLambda
      Action: 'lambda:InvokeFunction'
      Principal: events.amazonaws.com
      SourceArn: !Sub 'arn:aws:events:${AWS::Region}:${AWS::AccountId}:rule/kitchen-agent-reminder-*'

  # ==================== CLOUDWATCH LOG GROUPS ====================
  
  KitchenAgentCoreLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/KitchenAgentCore-${Environment}'
      RetentionInDays: 7

  ReminderExecutorLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/ReminderExecutor-${Environment}'
      RetentionInDays: 7

  ApiGatewayLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/apigateway/kitchen-agent-api-${Environment}'
      RetentionInDays: 7

  # ==================== CLOUDWATCH ALARMS ====================
  
  HighErrorRateAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'KitchenAgent-HighErrorRate-${Environment}'
      AlarmDescription: 'Alert when API error rate is high'
      MetricName: 5XXError
      Namespace: AWS/ApiGateway
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 2
      Threshold: 10
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: ApiName
          Value: !Ref KitchenAgentApi

  HighLatencyAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'KitchenAgent-HighLatency-${Environment}'
      AlarmDescription: 'Alert when API latency is high'
      MetricName: Latency
      Namespace: AWS/ApiGateway
      Statistic: Average
      Period: 60
      EvaluationPeriods: 3
      Threshold: 5000
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: ApiName
          Value: !Ref KitchenAgentApi

Outputs:
  ApiEndpoint:
    Description: 'API Gateway endpoint URL'
    Value: !Sub 'https://${KitchenAgentApi}.execute-api.${AWS::Region}.amazonaws.com/v1'
    Export:
      Name: !Sub '${AWS::StackName}-ApiEndpoint'

  ImageBucketName:
    Description: 'S3 bucket for image storage'
    Value: !Ref ImageBucket
    Export:
      Name: !Sub '${AWS::StackName}-ImageBucket'

  SessionsTableName:
    Description: 'DynamoDB table for sessions'
    Value: !Ref SessionsTable
    Export:
      Name: !Sub '${AWS::StackName}-SessionsTable'

  MarketPricesTableName:
    Description: 'DynamoDB table for market prices'
    Value: !Ref MarketPricesTable
    Export:
      Name: !Sub '${AWS::StackName}-MarketPricesTable'

  RemindersTableName:
    Description: 'DynamoDB table for reminders'
    Value: !Ref RemindersTable
    Export:
      Name: !Sub '${AWS::StackName}-RemindersTable'

  KitchenAgentCoreRoleArn:
    Description: 'IAM Role ARN for Kitchen Agent Core Lambda'
    Value: !GetAtt KitchenAgentCoreRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-KitchenAgentCoreRoleArn'

  ReminderExecutorRoleArn:
    Description: 'IAM Role ARN for Reminder Executor Lambda'
    Value: !GetAtt ReminderExecutorRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-ReminderExecutorRoleArn'
