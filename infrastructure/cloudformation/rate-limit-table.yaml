AWSTemplateFormatVersion: '2010-09-09'
Description: 'DynamoDB Table for Rate Limiting - Andhra Kitchen Agent'

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - prod
    Description: Environment name

Resources:
  # ============================================================================
  # Rate Limit Tracking Table
  # ============================================================================
  
  RateLimitTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'kitchen-agent-rate-limits-${Environment}'
      BillingMode: PAY_PER_REQUEST  # On-demand pricing
      AttributeDefinitions:
        - AttributeName: session_id
          AttributeType: S
        - AttributeName: endpoint
          AttributeType: S
      KeySchema:
        - AttributeName: session_id
          KeyType: HASH  # Partition key
        - AttributeName: endpoint
          KeyType: RANGE  # Sort key
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: andhra-kitchen-agent
        - Key: Purpose
          Value: rate-limiting

Outputs:
  RateLimitTableName:
    Description: Rate Limit DynamoDB Table Name
    Value: !Ref RateLimitTable
    Export:
      Name: !Sub '${AWS::StackName}-RateLimitTableName'
  
  RateLimitTableArn:
    Description: Rate Limit DynamoDB Table ARN
    Value: !GetAtt RateLimitTable.Arn
    Export:
      Name: !Sub '${AWS::StackName}-RateLimitTableArn'
