AWSTemplateFormatVersion: '2010-09-09'
Description: 'Encryption at Rest Configuration for Andhra Kitchen Agent'

# ============================================================================
# PARAMETERS
# ============================================================================

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - staging
      - prod
    Description: Environment name
  
  ProjectName:
    Type: String
    Default: kitchen-agent
    Description: Project name for resource naming

# ============================================================================
# RESOURCES
# ============================================================================

Resources:
  
  # --------------------------------------------------------------------------
  # KMS Key for Encryption
  # --------------------------------------------------------------------------
  
  EncryptionKey:
    Type: AWS::KMS::Key
    Properties:
      Description: !Sub 'KMS key for ${ProjectName}-${Environment} encryption at rest'
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          # Allow root account full access
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'
          
          # Allow DynamoDB to use the key
          - Sid: Allow DynamoDB to use the key
            Effect: Allow
            Principal:
              Service: dynamodb.amazonaws.com
            Action:
              - 'kms:Decrypt'
              - 'kms:DescribeKey'
              - 'kms:CreateGrant'
            Resource: '*'
            Condition:
              StringEquals:
                'kms:ViaService': !Sub 'dynamodb.${AWS::Region}.amazonaws.com'
          
          # Allow S3 to use the key
          - Sid: Allow S3 to use the key
            Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action:
              - 'kms:Decrypt'
              - 'kms:GenerateDataKey'
            Resource: '*'
          
          # Allow Lambda to use the key
          - Sid: Allow Lambda to use the key
            Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action:
              - 'kms:Decrypt'
              - 'kms:DescribeKey'
            Resource: '*'
      
      # Enable automatic key rotation
      EnableKeyRotation: true
      
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-encryption-key'
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: !Ref ProjectName
  
  # KMS Key Alias for easier reference
  EncryptionKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub 'alias/${ProjectName}-${Environment}-encryption'
      TargetKeyId: !Ref EncryptionKey
  
  # --------------------------------------------------------------------------
  # DynamoDB Tables with Encryption
  # --------------------------------------------------------------------------
  
  SessionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${ProjectName}-sessions-${Environment}'
      BillingMode: PAY_PER_REQUEST
      
      # Partition key and sort key
      AttributeDefinitions:
        - AttributeName: session_id
          AttributeType: S
        - AttributeName: data_type
          AttributeType: S
      
      KeySchema:
        - AttributeName: session_id
          KeyType: HASH
        - AttributeName: data_type
          KeyType: RANGE
      
      # SECURITY: Enable encryption at rest with KMS
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !Ref EncryptionKey
      
      # Enable TTL for automatic cleanup
      TimeToLiveSpecification:
        AttributeName: expiry_timestamp
        Enabled: true
      
      # Enable point-in-time recovery
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-sessions-${Environment}'
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: !Ref ProjectName
  
  MarketPricesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${ProjectName}-market-prices-${Environment}'
      BillingMode: PAY_PER_REQUEST
      
      AttributeDefinitions:
        - AttributeName: ingredient_name
          AttributeType: S
        - AttributeName: market_name
          AttributeType: S
        - AttributeName: last_updated
          AttributeType: S
      
      KeySchema:
        - AttributeName: ingredient_name
          KeyType: HASH
        - AttributeName: market_name
          KeyType: RANGE
      
      # Global secondary index for querying by last_updated
      GlobalSecondaryIndexes:
        - IndexName: LastUpdatedIndex
          KeySchema:
            - AttributeName: ingredient_name
              KeyType: HASH
            - AttributeName: last_updated
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      
      # SECURITY: Enable encryption at rest with KMS
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !Ref EncryptionKey
      
      # Enable point-in-time recovery
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-market-prices-${Environment}'
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: !Ref ProjectName
  
  RemindersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${ProjectName}-reminders-${Environment}'
      BillingMode: PAY_PER_REQUEST
      
      AttributeDefinitions:
        - AttributeName: session_id
          AttributeType: S
        - AttributeName: reminder_id
          AttributeType: S
        - AttributeName: status
          AttributeType: S
      
      KeySchema:
        - AttributeName: session_id
          KeyType: HASH
        - AttributeName: reminder_id
          KeyType: RANGE
      
      # Global secondary index for querying by status
      GlobalSecondaryIndexes:
        - IndexName: StatusIndex
          KeySchema:
            - AttributeName: session_id
              KeyType: HASH
            - AttributeName: status
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      
      # SECURITY: Enable encryption at rest with KMS
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !Ref EncryptionKey
      
      # Enable TTL for automatic cleanup
      TimeToLiveSpecification:
        AttributeName: expiry_timestamp
        Enabled: true
      
      # Enable point-in-time recovery
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-reminders-${Environment}'
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: !Ref ProjectName
  
  RateLimitsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${ProjectName}-rate-limits-${Environment}'
      BillingMode: PAY_PER_REQUEST
      
      AttributeDefinitions:
        - AttributeName: session_id
          AttributeType: S
        - AttributeName: endpoint
          AttributeType: S
      
      KeySchema:
        - AttributeName: session_id
          KeyType: HASH
        - AttributeName: endpoint
          KeyType: RANGE
      
      # SECURITY: Enable encryption at rest with KMS
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !Ref EncryptionKey
      
      # Enable TTL for automatic cleanup
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-rate-limits-${Environment}'
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: !Ref ProjectName
  
  # --------------------------------------------------------------------------
  # S3 Bucket with Encryption
  # --------------------------------------------------------------------------
  
  ImageBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${ProjectName}-images-${Environment}-${AWS::AccountId}'
      
      # SECURITY: Enable encryption at rest with KMS
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: 'aws:kms'
              KMSMasterKeyID: !Ref EncryptionKey
            BucketKeyEnabled: true
      
      # SECURITY: Block all public access
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      
      # Enable versioning for data protection
      VersioningConfiguration:
        Status: Enabled
      
      # Lifecycle policy to delete images after 24 hours
      LifecycleConfiguration:
        Rules:
          - Id: DeleteAfter24Hours
            Status: Enabled
            ExpirationInDays: 1
            NoncurrentVersionExpirationInDays: 1
      
      # Enable logging
      LoggingConfiguration:
        DestinationBucketName: !Ref LoggingBucket
        LogFilePrefix: 'image-bucket-logs/'
      
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-images-${Environment}'
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: !Ref ProjectName
  
  # S3 Bucket for Logs (also encrypted)
  LoggingBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${ProjectName}-logs-${Environment}-${AWS::AccountId}'
      
      # SECURITY: Enable encryption at rest
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: 'aws:kms'
              KMSMasterKeyID: !Ref EncryptionKey
            BucketKeyEnabled: true
      
      # SECURITY: Block all public access
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      
      # Lifecycle policy to delete logs after 90 days
      LifecycleConfiguration:
        Rules:
          - Id: DeleteAfter90Days
            Status: Enabled
            ExpirationInDays: 90
      
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-logs-${Environment}'
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: !Ref ProjectName

# ============================================================================
# OUTPUTS
# ============================================================================

Outputs:
  EncryptionKeyId:
    Description: KMS Key ID for encryption
    Value: !Ref EncryptionKey
    Export:
      Name: !Sub '${ProjectName}-${Environment}-encryption-key-id'
  
  EncryptionKeyArn:
    Description: KMS Key ARN for encryption
    Value: !GetAtt EncryptionKey.Arn
    Export:
      Name: !Sub '${ProjectName}-${Environment}-encryption-key-arn'
  
  SessionsTableName:
    Description: Sessions DynamoDB table name
    Value: !Ref SessionsTable
    Export:
      Name: !Sub '${ProjectName}-${Environment}-sessions-table'
  
  MarketPricesTableName:
    Description: Market Prices DynamoDB table name
    Value: !Ref MarketPricesTable
    Export:
      Name: !Sub '${ProjectName}-${Environment}-market-prices-table'
  
  RemindersTableName:
    Description: Reminders DynamoDB table name
    Value: !Ref RemindersTable
    Export:
      Name: !Sub '${ProjectName}-${Environment}-reminders-table'
  
  RateLimitsTableName:
    Description: Rate Limits DynamoDB table name
    Value: !Ref RateLimitsTable
    Export:
      Name: !Sub '${ProjectName}-${Environment}-rate-limits-table'
  
  ImageBucketName:
    Description: S3 bucket for images
    Value: !Ref ImageBucket
    Export:
      Name: !Sub '${ProjectName}-${Environment}-image-bucket'
  
  LoggingBucketName:
    Description: S3 bucket for logs
    Value: !Ref LoggingBucket
    Export:
      Name: !Sub '${ProjectName}-${Environment}-logging-bucket'
