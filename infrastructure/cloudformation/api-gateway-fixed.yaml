  # ============================================================================
  # Usage Plan
  # ============================================================================
  
  APIUsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    DependsOn: APIStage
    Properties:
      UsagePlanName: !Sub 'kitchen-agent-usage-plan-${Environment}'
      Description: Usage plan with rate limiting
      ApiStages:
        - ApiId: !Ref KitchenAgentAPI
          Stage: v1
      Throttle:
        BurstLimit: 20
        RateLimit: 100
      Quota:
        Limit: 10000
        Period: DAY
  
  # ============================================================================
  # Deployment & Stage
  # ============================================================================
  
  APIDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - ChatMethod
      - SessionMethod
      - GetSessionMethod
      - UploadImageMethod
      - AnalyzeImageMethod
      - GenerateRecipesMethod
      - GenerateShoppingListMethod
      - GetRemindersMethod
      - DismissReminderMethod
      - SnoozeReminderMethod
    Properties:
      RestApiId: !Ref KitchenAgentAPI
      Description: API Deployment
  
  APIStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      StageName: v1
      RestApiId: !Ref KitchenAgentAPI
      DeploymentId: !Ref APIDeployment
      Description: Version 1 API Stage
      TracingEnabled: true
      MethodSettings:
        - ResourcePath: '/*'
          HttpMethod: '*'
          LoggingLevel: INFO
          DataTraceEnabled: true
          MetricsEnabled: true
          ThrottlingBurstLimit: 20
          ThrottlingRateLimit: 100

  Api5xxAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'kitchen-agent-api-5xx-${Environment}'
      AlarmDescription: API Gateway 5XX responses exceeded the threshold
      Namespace: AWS/ApiGateway
      MetricName: 5XXError
      Dimensions:
        - Name: ApiName
          Value: !Sub 'kitchen-agent-api-${Environment}'
        - Name: Stage
          Value: v1
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If
        - HasAlarmTopic
        - [!Ref AlarmNotificationTopicArn]
        - !Ref AWS::NoValue

  ApiLatencyAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'kitchen-agent-api-latency-${Environment}'
      AlarmDescription: API Gateway latency exceeded the threshold
      Namespace: AWS/ApiGateway
      MetricName: Latency
      Dimensions:
        - Name: ApiName
          Value: !Sub 'kitchen-agent-api-${Environment}'
        - Name: Stage
          Value: v1
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5000
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If
        - HasAlarmTopic
        - [!Ref AlarmNotificationTopicArn]
        - !Ref AWS::NoValue

  RateLimiterFailureMetricFilter:
    Type: AWS::Logs::MetricFilter
    Condition: HasApplicationLogGroup
    Properties:
      LogGroupName: !Ref ApplicationLogGroupName
      FilterPattern: '"Rate limiter failed closed in production"'
      MetricTransformations:
        - MetricNamespace: !Sub 'AndhraKitchenAgent/${Environment}/Security'
          MetricName: RateLimiterFailures
          MetricValue: '1'

  RateLimitTableUnavailableMetricFilter:
    Type: AWS::Logs::MetricFilter
    Condition: HasApplicationLogGroup
    Properties:
      LogGroupName: !Ref ApplicationLogGroupName
      FilterPattern: '"Rate limit table unavailable in production - denying request for safety"'
      MetricTransformations:
        - MetricNamespace: !Sub 'AndhraKitchenAgent/${Environment}/Security'
          MetricName: RateLimiterFailures
          MetricValue: '1'

  ImageCleanupFailureMetricFilter:
    Type: AWS::Logs::MetricFilter
    Condition: HasApplicationLogGroup
    Properties:
      LogGroupName: !Ref ApplicationLogGroupName
      FilterPattern: '"Image metadata storage failed and S3 cleanup also failed"'
      MetricTransformations:
        - MetricNamespace: !Sub 'AndhraKitchenAgent/${Environment}/Security'
          MetricName: ImageCleanupFailures
          MetricValue: '1'

  RateLimiterFailureAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: HasApplicationLogGroup
    Properties:
      AlarmName: !Sub 'kitchen-agent-rate-limiter-failure-${Environment}'
      AlarmDescription: The application failed closed due to rate limiter backend errors
      Namespace: !Sub 'AndhraKitchenAgent/${Environment}/Security'
      MetricName: RateLimiterFailures
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If
        - HasAlarmTopic
        - [!Ref AlarmNotificationTopicArn]
        - !Ref AWS::NoValue

  ImageCleanupFailureAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: HasApplicationLogGroup
    Properties:
      AlarmName: !Sub 'kitchen-agent-image-cleanup-failure-${Environment}'
      AlarmDescription: Image upload cleanup failed and manual intervention is required
      Namespace: !Sub 'AndhraKitchenAgent/${Environment}/Security'
      MetricName: ImageCleanupFailures
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If
        - HasAlarmTopic
        - [!Ref AlarmNotificationTopicArn]
        - !Ref AWS::NoValue


Outputs:
  APIEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub 'https://${KitchenAgentAPI}.execute-api.${AWS::Region}.amazonaws.com/v1'
    Export:
      Name: !Sub '${AWS::StackName}-APIEndpoint'
  
  APIId:
    Description: API Gateway ID
    Value: !Ref KitchenAgentAPI
    Export:
      Name: !Sub '${AWS::StackName}-APIId'
  
  APIStage:
    Description: API Gateway Stage
    Value: !Ref APIStage
    Export:
      Name: !Sub '${AWS::StackName}-APIStage'
  
  UsagePlanId:
    Description: Usage Plan ID
    Value: !Ref APIUsagePlan
    Export:
      Name: !Sub '${AWS::StackName}-UsagePlanId'
  
  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref UserPool
    Export:
      Name: !Sub '${AWS::StackName}-UserPoolId'
  
  UserPoolClientId:
    Description: Cognito User Pool Client ID
    Value: !Ref UserPoolClient
    Export:
      Name: !Sub '${AWS::StackName}-UserPoolClientId'
  
  CognitoAuthorizerId:
    Description: API Gateway Cognito Authorizer ID
    Value: !Ref CognitoAuthorizer
    Export:
      Name: !Sub '${AWS::StackName}-CognitoAuthorizerId'
  
  CognitoRegion:
    Description: Cognito Region
    Value: !Ref AWS::Region
    Export:
      Name: !Sub '${AWS::StackName}-CognitoRegion'

# SECURITY NOTES:
# 1. AllowedOrigin parameter MUST be set to your domain in production.
# 2. All application endpoints use COGNITO_USER_POOLS authorization.
# 3. OPTIONS methods are defined for every browser-facing route.
# 4. Gateway responses include CORS headers on auth and error paths.
# 5. Optional security alarms can be enabled with AlarmNotificationTopicArn and ApplicationLogGroupName.
